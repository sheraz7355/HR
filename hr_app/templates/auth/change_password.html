{% extends "layouts/base.html" %}
{% block title %}Change Password - HR Portal{% endblock %}
{% block content %}
<div class="page-header"><h1>Change Password</h1></div>
<div class="card" style="max-width:440px;">
    <form method="POST">
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="current_password" class="form-control" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" class="form-control" required minlength="4">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" required minlength="4">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Update Password</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-block mt-10">Cancel</a>
    </form>
</div>
{% endblock %}
